<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Love 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #faf7f5 0%, #f5ebe0 50%, #fdf6f0 100%);
      font-family: 'Josefin Sans', sans-serif;
      color: #5c4d4d;
      overflow-x: hidden;
    }

    /* Floral Background Pattern */
    .floral-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
      background-image: 
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e8b4b8' fill-opacity='0.4'%3E%3Cpath d='M30 30c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10-10-4.5-10-10zm-20 0c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10-10-4.5-10-10z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Floating flowers */
    .flowers-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .floating-flower {
      position: absolute;
      font-size: 24px;
      animation: floatFlower 15s ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes floatFlower {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Soft decorative elements */
    .deco-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .deco-circle.c1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(232, 180, 184, 0.3) 0%, transparent 70%);
      top: -100px;
      right: -100px;
    }

    .deco-circle.c2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 218, 213, 0.4) 0%, transparent 70%);
      bottom: -150px;
      left: -150px;
    }

    .deco-circle.c3 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(219, 175, 185, 0.2) 0%, transparent 70%);
      top: 40%;
      left: 10%;
    }

    /* Lock Screen */
    #lockScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }

    #lockScreen.hidden {
      display: none;
    }

    .lock-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px 45px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      border: 1px solid rgba(232, 180, 184, 0.3);
      box-shadow: 
        0 20px 60px rgba(92, 77, 77, 0.08),
        0 0 100px rgba(232, 180, 184, 0.1);
      position: relative;
    }

    /* Decorative corner flowers */
    .corner-flower {
      position: absolute;
      font-size: 30px;
      opacity: 0.5;
    }

    .corner-flower.tl { top: -15px; left: -15px; transform: rotate(-15deg); }
    .corner-flower.tr { top: -15px; right: -15px; transform: rotate(15deg); }
    .corner-flower.bl { bottom: -15px; left: -15px; transform: rotate(-195deg); }
    .corner-flower.br { bottom: -15px; right: -15px; transform: rotate(195deg); }

    .lock-icon {
      font-size: 50px;
      margin-bottom: 15px;
      animation: gentlePulse 3s ease-in-out infinite;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .lock-container h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #5c4d4d;
      letter-spacing: 1px;
    }

    .lock-container > p {
      font-size: 0.95rem;
      color: #8a7575;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* Video wrapper */
    .video-wrapper {
      border-radius: 20px;
      overflow: hidden;
      margin: 25px auto;
      box-shadow: 0 10px 40px rgba(92, 77, 77, 0.1);
      border: 1px solid rgba(232, 180, 184, 0.3);
      background: #f5ebe0;
      max-width: 320px;
    }

    .video-thumbnail {
      position: relative;
      cursor: pointer;
      display: block;
    }

    .video-thumbnail img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      display: block;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .video-thumbnail:hover .play-button {
      transform: translate(-50%, -50%) scale(1.1);
    }

    .video-iframe-container {
      display: none;
    }

    .video-iframe-container.active {
      display: block;
    }

    #lockVideoWrapper iframe,
    .video-iframe-container iframe {
      width: 100%;
      height: 500px;
      display: block;
      max-width: 100%;
    }

    .video-placeholder {
      color: #8a7575;
      font-style: italic;
      padding: 40px;
      font-size: 0.95rem;
    }

    /* Code input */
    #codeInput {
      width: 100%;
      padding: 18px 20px;
      font-size: 1.1rem;
      border: 2px solid #e8d5d0;
      border-radius: 15px;
      background: #fdf6f0;
      color: #5c4d4d;
      text-align: center;
      letter-spacing: 6px;
      transition: all 0.3s ease;
      font-family: 'Josefin Sans', sans-serif;
    }

    #codeInput:focus {
      outline: none;
      border-color: #e8b4b8;
      background: #fff;
      box-shadow: 0 0 20px rgba(232, 180, 184, 0.2);
    }

    #codeInput::placeholder {
      color: #c9b0b0;
      letter-spacing: 2px;
      font-size: 0.95rem;
    }

    .unlock-btn {
      margin-top: 25px;
      padding: 16px 45px;
      font-size: 1rem;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      background: linear-gradient(135deg, #e8b4b8, #d4a5a5);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      box-shadow: 0 8px 25px rgba(212, 165, 165, 0.3);
    }

    .unlock-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(212, 165, 165, 0.4);
    }

    #errorMsg {
      color: #c97b7b;
      margin-top: 15px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #errorMsg.show {
      opacity: 1;
    }

    /* Main Content */
    #mainContent {
      display: none;
      min-height: 100vh;
      padding: 80px 20px;
      position: relative;
      z-index: 10;
    }

    #mainContent.visible {
      display: block;
      animation: fadeInSoft 1s ease;
    }

    @keyframes fadeInSoft {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }

    .header::before,
    .header::after {
      content: '🌸';
      font-size: 24px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    .header::before { left: 10%; }
    .header::after { right: 10%; }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 500;
      color: #5c4d4d;
      margin-bottom: 10px;
      font-style: italic;
    }

    .header p {
      color: #8a7575;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Memory Card */
    .memory-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 60px 50px;
      margin-bottom: 40px;
      border: 1px solid rgba(232, 180, 184, 0.3);
      box-shadow: 
        0 15px 50px rgba(92, 77, 77, 0.06),
        0 0 80px rgba(232, 180, 184, 0.08);
      position: relative;
      overflow: hidden;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Vintage paper texture */
    .memory-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(135deg, transparent 0%, rgba(232, 180, 184, 0.03) 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .card-corner {
      position: absolute;
      font-size: 40px;
      opacity: 0.15;
      color: #e8b4b8;
    }

    .card-corner.top-left { top: 15px; left: 20px; }
    .card-corner.bottom-right { bottom: 15px; right: 20px; transform: rotate(180deg); }

    /* Date Badge - More Visible */
    .date-badge {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #e8b4b8, #d4a5a5);
      border-radius: 30px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      letter-spacing: 3px;
      margin-bottom: 30px;
      box-shadow: 0 8px 25px rgba(232, 180, 184, 0.3);
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .date-badge.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Message Text - Typewriter Effect */
    #messageText {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      line-height: 1.9;
      color: #5c4d4d;
      font-style: italic;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
      max-width: 600px;
      text-align: center;
    }

    #messageText.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Word reveal animation */
    .word {
      opacity: 0;
      display: inline-block;
      margin-right: 0.3em;
      transition: opacity 0.3s ease;
    }

    .word.revealed {
      opacity: 1;
    }

    /* Placeholder text */
    .placeholder-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: #b08888;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .placeholder-text.hidden {
      display: none;
    }

    /* Reveal Button */
    .reveal-btn {
      display: block;
      margin: 0 auto;
      padding: 18px 50px;
      font-size: 1rem;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      background: linear-gradient(135deg, #e8b4b8, #d4a5a5);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(212, 165, 165, 0.3);
    }

    .reveal-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(212, 165, 165, 0.4);
    }

    .reveal-btn:active {
      transform: translateY(-1px);
    }

    .reveal-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .reveal-btn span {
      margin-right: 8px;
    }

    /* Sparkle effect */
    .sparkle {
      position: fixed;
      pointer-events: none;
      animation: sparkleFloat 1s ease-out forwards;
      font-size: 20px;
    }

    @keyframes sparkleFloat {
      0% { transform: translateY(0) scale(0); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 60px 20px 40px;
      color: #b08888;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .footer-emoji {
      font-size: 28px;
      margin-bottom: 15px;
      opacity: 0.6;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 40px 0;
      color: #d4a5a5;
      opacity: 0.5;
    }

    .divider::before,
    .divider::after {
      content: '';
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4a5a5, transparent);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .lock-container {
        padding: 40px 30px;
      }
      .lock-container h1 {
        font-size: 1.8rem;
      }
      .video-wrapper {
        max-width: 280px;
      }
      #lockVideoWrapper iframe,
      .video-wrapper iframe {
        height: 400px;
      }
      #codeInput {
        font-size: 1rem;
        letter-spacing: 4px;
        padding: 15px 18px;
      }
      .header h1 {
        font-size: 2rem;
      }
      .header::before,
      .header::after {
        display: none;
      }
      .memory-card {
        padding: 45px 25px;
        min-height: 300px;
      }
      #messageText {
        font-size: 1.4rem;
      }
      .reveal-btn {
        padding: 15px 40px;
      }
      .card-corner {
        font-size: 30px;
      }
      .date-badge {
        font-size: 1rem;
        padding: 10px 25px;
      }
    }
  </style>
</head>
<body>
  <!-- Background Elements -->
  <div class="floral-bg"></div>
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>
  <div class="deco-circle c3"></div>
  <div class="flowers-container" id="flowersContainer"></div>

  <!-- Lock Screen -->
  <div id="lockScreen">
    <div class="lock-container">
      <span class="corner-flower tl">🌷</span>
      <span class="corner-flower tr">🌸</span>
      <span class="corner-flower bl">🌹</span>
      <span class="corner-flower br">🌺</span>
      
      <div class="lock-icon">💌</div>
      <h1>A Special Surprise...</h1>
      <p>Please watch the video to find the secret code ✨</p>
      
      <div class="video-wrapper" id="lockVideoWrapper">
      </div>
      
      <input type="text" id="codeInput" placeholder="Enter the code..." autocomplete="off">
      <button class="unlock-btn" id="unlockBtn">Unlock 🌸</button>
      <p id="errorMsg">Hmm, that's not quite right 💭</p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="mainContent">
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>For My Lucuska</h1>
        <p>A collection of moments</p>
      </div>

      <!-- Memory Card -->
      <div class="memory-card">
        <span class="card-corner top-left">❧</span>
        <span class="card-corner bottom-right">❧</span>
        
        <span class="date-badge" id="dateDisplay"></span>
        
        <p class="placeholder-text" id="placeholderText">Press the button below to discover a memory...</p>
        
        <p id="messageText"></p>
      </div>

      <!-- Reveal Button -->
      <button class="reveal-btn" id="revealBtn">
        <span>✨</span> Reveal a Memory
      </button>

      <div class="divider">🌸</div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-emoji">🌷🌸🌹</div>
        <p>Made with love by your cappucino ☕💕</p>
      </div>
    </div>
  </div>

  <script>

    // ✨ CONFIGURATION ✨

    const CONFIG = {

      writings: [

        { date: "March 31", text: "We had our first game night! I enjoyed playing GeoGuessr with her so much, even though my internet was acting up." },

        { date: "April 21", text: "Another day where we talked while she walked to her friend's house. She cooked and had dinner while we were on the call. I find her even prettier when she's just doing her own things and I get to stare at her. Our conversation also included future plans, and it was so nice to hear that I am part of them." },

        { date: "May 2", text: "Today she showed me the wallpaper she set of us. She also told me about the fireplace at her parents' house, and now I want to do a similar outing with her." },
        { date: "May 3", text: "I showed her the mini model I made of Döme today. It was meant to be a surprise for when she visits, but I couldn't hold it in! Also, her mom loved the flowers I got for her." },
        { date: "May 4", text: "Today she had her test, and I'm pretty sure she did good. No matter what the results are, I am proud of her. Also, I bought her coffee today." },
        { date: "May 5", text: "Her mom told me to take care of her when she comes to visit me. I promised her mom that I will indeed take care of her." },
        { date: "May 6", text: "She dyed her hair, and I love her new look so much. I also got her pho soup since she loves it. Today she finished packing her stuff as she is leaving tomorrow morning to fly to me. We also completed our 2-month mark today." },
        { date: "June 3", text: "The letter I prepared for our 3-month anniversary finally reached her. I've been waiting for this moment for a while. Today was also the day I received the first mail from the university. Now we are waiting to proceed with the next steps. I am already excited." },
        { date: "June 8", text: "Today she received the call that she will be starting work next week. I am so excited for her! We also made the payment for my application today. She showed me this vintage clothes shop she found and said she'd like to take me there." },
        { date: "June 11", text: "I had my university interview today and got accepted! She was so supportive through this whole time. We talked right after the interview. I cannot wait to see her." },
        { date: "June 12", text: "I feel relieved today because she figured out her car permit thing. She kept me updated on everything constantly. We also had a deep conversation today and talked more about our future plans." },
        { date: "June 14", text: "Tomorrow she starts her job. I am so excited because it means a lot to me as well. I know she is feeling a bit stressed, but I have no doubts she will settle in quickly because she is naturally good at what she does. We also spent a lot of time on the call today celebrating our 100-day milestone." },
        { date: "June 15", text: "Today was her first day at work. I am so proud of her. We talked after she came back. I got her some wine, and we celebrated her new beginnings." }
      ]
    };

    // ============================================
    // DOM Elements
    // ============================================
    const lockScreen = document.getElementById('lockScreen');
    const mainContent = document.getElementById('mainContent');
    const codeInput = document.getElementById('codeInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const errorMsg = document.getElementById('errorMsg');
    const revealBtn = document.getElementById('revealBtn');
    const messageText = document.getElementById('messageText');
    const dateDisplay = document.getElementById('dateDisplay');
    const placeholderText = document.getElementById('placeholderText');
    const lockVideoWrapper = document.getElementById('lockVideoWrapper');
    const flowersContainer = document.getElementById('flowersContainer');

    // ============================================
    // Background Effects
    // ============================================
    function createFloatingFlowers() {
      const flowers = ['🌸', '🌷', '🌹', '🌺', '💐', '🌻', '💮', '🏵️'];
      for (let i = 0; i < 12; i++) {
        const flower = document.createElement('div');
        flower.className = 'floating-flower';
        flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
        flower.style.left = Math.random() * 100 + '%';
        flower.style.animationDelay = Math.random() * 15 + 's';
        flower.style.animationDuration = (15 + Math.random() * 10) + 's';
        flowersContainer.appendChild(flower);
      }
    }

    // ============================================
    // Video
    // ============================================
    function setVideo() {
      if (CONFIG.youtubeId) {
        lockVideoWrapper.innerHTML = `
          <iframe 
            src="https://www.youtube-nocookie.com/embed/${CONFIG.youtubeId}?rel=0&hl=en" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        `;
      } else {
        lockVideoWrapper.innerHTML = '<p class="video-placeholder">Video coming soon 🌸</p>';
      }
    }

    // ============================================
    // Access Control
    // ============================================
    
    function unlock() {
      lockScreen.classList.add('hidden');
      mainContent.classList.add('visible');
    }

    function handleUnlock() {
      const enteredCode = codeInput.value.trim().toLowerCase();
      
      if (enteredCode === CONFIG.code.toLowerCase()) {
        unlock();
      } else {
        errorMsg.classList.add('show');
        codeInput.value = '';
        codeInput.focus();
        setTimeout(() => {
          errorMsg.classList.remove('show');
        }, 2500);
      }
    }

    // ============================================
    // Memory Reveal with Typewriter Effect
    // ============================================
    let lastIndex = -1;
    let isRevealing = false;
    
    function getRandomWriting() {
      const writings = CONFIG.writings;
      let randomIndex;
      
      do {
        randomIndex = Math.floor(Math.random() * writings.length);
      } while (randomIndex === lastIndex && writings.length > 1);
      
      lastIndex = randomIndex;
      return writings[randomIndex];
    }

    function createSparkles(button) {
      const emojis = ['✨', '💕', '🌸', '💫', '🌷'];
      const rect = button.getBoundingClientRect();
      
      for (let i = 0; i < 8; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        sparkle.style.left = (rect.left + Math.random() * rect.width) + 'px';
        sparkle.style.top = rect.top + 'px';
        document.body.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    function revealTextWordByWord(text, element) {
      const words = text.split(' ');
      element.innerHTML = '';
      
      words.forEach((word, index) => {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = word + ' ';
        element.appendChild(span);
      });
      
      const wordSpans = element.querySelectorAll('.word');
      let delay = 0;
      
      wordSpans.forEach((span, index) => {
        setTimeout(() => {
          span.classList.add('revealed');
        }, delay);
        delay += 100; // 100ms between each word
      });
    }

    function showMessage() {
      if (isRevealing) return;
      isRevealing = true;
      
      revealBtn.disabled = true;
      placeholderText.classList.add('hidden');
      messageText.classList.remove('visible');
      dateDisplay.classList.remove('visible');
      
      // Create sparkle effect
      createSparkles(revealBtn);
      
      setTimeout(() => {
        const writing = getRandomWriting();
        dateDisplay.textContent = writing.date;
        
        // Show date with animation
        dateDisplay.classList.add('visible');
        
        // Reveal text word by word
        setTimeout(() => {
          messageText.classList.add('visible');
          revealTextWordByWord(writing.text, messageText);
          
          // Re-enable button after reveal is complete
          const textLength = writing.text.split(' ').length;
          setTimeout(() => {
            revealBtn.disabled = false;
            isRevealing = false;
          }, textLength * 100 + 500);
        }, 400);
        
      }, 300);
    }

    // ============================================
    // Event Listeners
    // ============================================
    unlockBtn.addEventListener('click', handleUnlock);
    
    codeInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleUnlock();
      }
    });

    revealBtn.addEventListener('click', showMessage);

    // ============================================
    // Initialize
    // ============================================
    createFloatingFlowers();
    setVideo();
  </script>
</body>
</html>
